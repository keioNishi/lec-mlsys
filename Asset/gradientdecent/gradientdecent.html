<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>勾配降下法の可視化 - Gradient Descent Visualization</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useRef } = React;

    function OptimizationVisualization() {
      const containerRef = useRef(null);
      const sceneRef = useRef(null);
      const rendererRef = useRef(null);
      const cameraRef = useRef(null);
      const isDragging = useRef(false);
      const previousMousePosition = useRef({ x: 0, y: 0 });
      const spherical = useRef({ theta: Math.PI / 4, phi: Math.PI / 3, radius: 10 });
      
      const [animating, setAnimating] = useState(false);
      const [learningRate, setLearningRate] = useState(0.1);
      const [optimizer, setOptimizer] = useState('sgd');
      const [momentum, setMomentum] = useState(0.9);
      const [beta1, setBeta1] = useState(0.9);
      const [beta2, setBeta2] = useState(0.999);
      const animationRef = useRef(null);

      // Loss function with multiple local minima
      // All minima have the same depth, but different widths
      const lossFunction = (x, y) => {
        const term1 = -4 * Math.exp(-((x + 1) ** 2 + (y + 1) ** 2) / 0.15);
        const term2 = -4 * Math.exp(-((x - 1) ** 2 + (y - 1) ** 2) / 0.6);
        const term3 = -4 * Math.exp(-((x - 0.5) ** 2 + (y + 0.5) ** 2) / 0.3);
        const term4 = (x ** 2 + y ** 2) * 0.03;
        return term1 + term2 + term3 + term4 + 1;
      };

      const gradient = (x, y) => {
        const h = 0.001;
        const dx = (lossFunction(x + h, y) - lossFunction(x - h, y)) / (2 * h);
        const dy = (lossFunction(x, y + h) - lossFunction(x, y - h)) / (2 * h);
        return { dx, dy };
      };

      const SCALE = 2;

      const optimizers = {
        sgd: (x, y, grad, state, lr) => ({
          x: x - lr * grad.dx,
          y: y - lr * grad.dy,
          state: {}
        }),
        
        momentum: (x, y, grad, state, lr) => {
          const vx = (state.vx || 0) * momentum + lr * grad.dx;
          const vy = (state.vy || 0) * momentum + lr * grad.dy;
          return { x: x - vx, y: y - vy, state: { vx, vy } };
        },
        
        adagrad: (x, y, grad, state, lr) => {
          const gx = (state.gx || 0) + grad.dx ** 2;
          const gy = (state.gy || 0) + grad.dy ** 2;
          const eps = 1e-8;
          return {
            x: x - (lr / Math.sqrt(gx + eps)) * grad.dx,
            y: y - (lr / Math.sqrt(gy + eps)) * grad.dy,
            state: { gx, gy }
          };
        },
        
        rmsprop: (x, y, grad, state, lr) => {
          const decay = 0.9;
          const eps = 1e-8;
          const sx = decay * (state.sx || 0) + (1 - decay) * grad.dx ** 2;
          const sy = decay * (state.sy || 0) + (1 - decay) * grad.dy ** 2;
          return {
            x: x - (lr / Math.sqrt(sx + eps)) * grad.dx,
            y: y - (lr / Math.sqrt(sy + eps)) * grad.dy,
            state: { sx, sy }
          };
        },
        
        adam: (x, y, grad, state, lr) => {
          const eps = 1e-8;
          const t = (state.t || 0) + 1;
          const mx = beta1 * (state.mx || 0) + (1 - beta1) * grad.dx;
          const my = beta1 * (state.my || 0) + (1 - beta1) * grad.dy;
          const vx = beta2 * (state.vx || 0) + (1 - beta2) * grad.dx ** 2;
          const vy = beta2 * (state.vy || 0) + (1 - beta2) * grad.dy ** 2;
          const mxHat = mx / (1 - Math.pow(beta1, t));
          const myHat = my / (1 - Math.pow(beta1, t));
          const vxHat = vx / (1 - Math.pow(beta2, t));
          const vyHat = vy / (1 - Math.pow(beta2, t));
          return {
            x: x - (lr * mxHat) / (Math.sqrt(vxHat) + eps),
            y: y - (lr * myHat) / (Math.sqrt(vyHat) + eps),
            state: { mx, my, vx, vy, t }
          };
        }
      };

      const optimizerInfo = {
        sgd: { name: 'SGD', description: '最も基本的な勾配降下法' },
        momentum: { name: 'Momentum', description: '慣性を利用して振動を抑制' },
        adagrad: { name: 'AdaGrad', description: '学習率を適応的に調整' },
        rmsprop: { name: 'RMSprop', description: 'AdaGradの改良版' },
        adam: { name: 'Adam', description: 'MomentumとRMSpropの組み合わせ' }
      };

      useEffect(() => {
        if (!containerRef.current) return;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        sceneRef.current = scene;

        const camera = new THREE.PerspectiveCamera(60, containerRef.current.clientWidth / containerRef.current.clientHeight, 0.1, 1000);
        cameraRef.current = camera;
        updateCameraPosition();

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        containerRef.current.appendChild(renderer.domElement);
        rendererRef.current = renderer;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0xff6b9d, 0.5);
        pointLight.position.set(-3, 5, -3);
        scene.add(pointLight);

        createSurface(scene);
        createGrid(scene);
        createMinimaMarkers(scene);
        createAxes(scene);

        const animate = () => {
          requestAnimationFrame(animate);
          renderer.render(scene, camera);
        };
        animate();

        const handleMouseDown = (e) => {
          isDragging.current = true;
          previousMousePosition.current = { x: e.clientX, y: e.clientY };
        };

        const handleMouseMove = (e) => {
          if (!isDragging.current) return;
          const deltaX = e.clientX - previousMousePosition.current.x;
          const deltaY = e.clientY - previousMousePosition.current.y;
          spherical.current.theta -= deltaX * 0.01;
          spherical.current.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.current.phi - deltaY * 0.01));
          updateCameraPosition();
          previousMousePosition.current = { x: e.clientX, y: e.clientY };
        };

        const handleMouseUp = () => { isDragging.current = false; };

        const handleWheel = (e) => {
          e.preventDefault();
          spherical.current.radius = Math.max(5, Math.min(20, spherical.current.radius + e.deltaY * 0.01));
          updateCameraPosition();
        };

        const handleTouchStart = (e) => {
          if (e.touches.length === 1) {
            isDragging.current = true;
            previousMousePosition.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
          }
        };

        const handleTouchMove = (e) => {
          if (!isDragging.current || e.touches.length !== 1) return;
          const deltaX = e.touches[0].clientX - previousMousePosition.current.x;
          const deltaY = e.touches[0].clientY - previousMousePosition.current.y;
          spherical.current.theta -= deltaX * 0.01;
          spherical.current.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.current.phi - deltaY * 0.01));
          updateCameraPosition();
          previousMousePosition.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        };

        const handleTouchEnd = () => { isDragging.current = false; };

        renderer.domElement.addEventListener('mousedown', handleMouseDown);
        renderer.domElement.addEventListener('mousemove', handleMouseMove);
        renderer.domElement.addEventListener('mouseup', handleMouseUp);
        renderer.domElement.addEventListener('mouseleave', handleMouseUp);
        renderer.domElement.addEventListener('wheel', handleWheel, { passive: false });
        renderer.domElement.addEventListener('touchstart', handleTouchStart);
        renderer.domElement.addEventListener('touchmove', handleTouchMove);
        renderer.domElement.addEventListener('touchend', handleTouchEnd);

        const handleResize = () => {
          if (!containerRef.current) return;
          camera.aspect = containerRef.current.clientWidth / containerRef.current.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
        };
        window.addEventListener('resize', handleResize);

        return () => {
          renderer.domElement.removeEventListener('mousedown', handleMouseDown);
          renderer.domElement.removeEventListener('mousemove', handleMouseMove);
          renderer.domElement.removeEventListener('mouseup', handleMouseUp);
          renderer.domElement.removeEventListener('mouseleave', handleMouseUp);
          renderer.domElement.removeEventListener('wheel', handleWheel);
          renderer.domElement.removeEventListener('touchstart', handleTouchStart);
          renderer.domElement.removeEventListener('touchmove', handleTouchMove);
          renderer.domElement.removeEventListener('touchend', handleTouchEnd);
          window.removeEventListener('resize', handleResize);
          if (animationRef.current) clearTimeout(animationRef.current);
          if (containerRef.current && renderer.domElement) {
            containerRef.current.removeChild(renderer.domElement);
          }
          renderer.dispose();
        };
      }, []);

      const updateCameraPosition = () => {
        if (!cameraRef.current) return;
        const { theta, phi, radius } = spherical.current;
        cameraRef.current.position.x = radius * Math.sin(phi) * Math.cos(theta);
        cameraRef.current.position.y = radius * Math.cos(phi);
        cameraRef.current.position.z = radius * Math.sin(phi) * Math.sin(theta);
        cameraRef.current.lookAt(0, -2, 0);
      };

      const createSurface = (scene) => {
        const resolution = 100;
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        const colors = [];
        const indices = [];
        
        for (let i = 0; i < resolution; i++) {
          for (let j = 0; j < resolution; j++) {
            const x = -2 + (4 * i) / (resolution - 1);
            const y = -2 + (4 * j) / (resolution - 1);
            const z = lossFunction(x, y);
            vertices.push(x * SCALE, z, y * SCALE);
          }
        }
        
        let minZ = Infinity, maxZ = -Infinity;
        for (let i = 1; i < vertices.length; i += 3) {
          minZ = Math.min(minZ, vertices[i]);
          maxZ = Math.max(maxZ, vertices[i]);
        }
        
        for (let i = 1; i < vertices.length; i += 3) {
          const z = vertices[i];
          const t = (z - minZ) / (maxZ - minZ);
          const color = new THREE.Color();
          if (t < 0.5) {
            color.setHSL(0.55 - t * 0.2, 0.9, 0.5 + t * 0.1);
          } else {
            color.setHSL(0.85, 0.8, 0.4 + (t - 0.5) * 0.3);
          }
          colors.push(color.r, color.g, color.b);
        }
        
        for (let i = 0; i < resolution - 1; i++) {
          for (let j = 0; j < resolution - 1; j++) {
            const a = i * resolution + j;
            const b = i * resolution + j + 1;
            const c = (i + 1) * resolution + j;
            const d = (i + 1) * resolution + j + 1;
            indices.push(a, b, c);
            indices.push(b, d, c);
          }
        }
        
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();

        const material = new THREE.MeshPhongMaterial({
          vertexColors: true,
          side: THREE.DoubleSide,
          shininess: 50,
          transparent: true,
          opacity: 0.85,
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.name = 'surface';
        scene.add(mesh);
      };

      const createGrid = (scene) => {
        const gridSize = 4 * SCALE;
        const gridHelper = new THREE.GridHelper(gridSize * 2, 16, 0x444466, 0x333355);
        gridHelper.position.y = -5;
        scene.add(gridHelper);

        const planeGeometry = new THREE.PlaneGeometry(gridSize * 2, gridSize * 2);
        const planeMaterial = new THREE.MeshBasicMaterial({ 
          color: 0x2a2a4a, 
          transparent: true, 
          opacity: 0.5,
          side: THREE.DoubleSide 
        });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -5;
        scene.add(plane);
      };

      const createMinimaMarkers = (scene) => {
        const minima = [
          { x: -1, y: -1 },
          { x: 1, y: 1 },
          { x: 0.5, y: -0.5 },
        ];

        minima.forEach((min) => {
          const z = lossFunction(min.x, min.y);
          const posX = min.x * SCALE;
          const posY = z;
          const posZ = min.y * SCALE;
          
          const starGeometry = new THREE.OctahedronGeometry(0.15, 0);
          const starMaterial = new THREE.MeshBasicMaterial({ color: 0xff3366 });
          const star = new THREE.Mesh(starGeometry, starMaterial);
          star.position.set(posX, posY, posZ);
          scene.add(star);

          const glowGeometry = new THREE.SphereGeometry(0.25, 16, 16);
          const glowMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xff3366, 
            transparent: true, 
            opacity: 0.3 
          });
          const glow = new THREE.Mesh(glowGeometry, glowMaterial);
          glow.position.set(posX, posY, posZ);
          scene.add(glow);

          const lineGeometry = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(posX, posY, posZ),
            new THREE.Vector3(posX, -5, posZ)
          ]);
          const lineMaterial = new THREE.LineDashedMaterial({ 
            color: 0xff6699, 
            dashSize: 0.15, 
            gapSize: 0.1 
          });
          const line = new THREE.Line(lineGeometry, lineMaterial);
          line.computeLineDistances();
          scene.add(line);
        });
      };

      const createAxes = (scene) => {
        const axesGroup = new THREE.Group();
        const axisLength = 2 * SCALE + 0.5;
        
        const xGeometry = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(-axisLength, -5, 0),
          new THREE.Vector3(axisLength, -5, 0)
        ]);
        const xLine = new THREE.Line(xGeometry, new THREE.LineBasicMaterial({ color: 0x888899 }));
        axesGroup.add(xLine);

        const zGeometry = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(0, -5, -axisLength),
          new THREE.Vector3(0, -5, axisLength)
        ]);
        const zLine = new THREE.Line(zGeometry, new THREE.LineBasicMaterial({ color: 0x888899 }));
        axesGroup.add(zLine);

        const yGeometry = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(0, -5, 0),
          new THREE.Vector3(0, 2, 0)
        ]);
        const yLine = new THREE.Line(yGeometry, new THREE.LineBasicMaterial({ color: 0x888899 }));
        axesGroup.add(yLine);

        scene.add(axesGroup);
      };

      const stopAnimation = () => {
        if (animationRef.current) {
          clearTimeout(animationRef.current);
          animationRef.current = null;
        }
        setAnimating(false);
      };

      const runAnimation = () => {
        if (!sceneRef.current) return;
        
        stopAnimation();
        setAnimating(true);

        const existingPath = sceneRef.current.getObjectByName('gradientPath');
        if (existingPath) {
          sceneRef.current.remove(existingPath);
        }

        const startX = (Math.random() - 0.5) * 3.6;
        const startY = (Math.random() - 0.5) * 3.6;
        
        let x = startX, y = startY;
        let state = {};
        const points = [];
        const maxIterations = 150;
        
        for (let i = 0; i < maxIterations; i++) {
          const z = lossFunction(x, y);
          points.push(new THREE.Vector3(x * SCALE, z + 0.02, y * SCALE));
          
          const grad = gradient(x, y);
          const result = optimizers[optimizer](x, y, grad, state, learningRate);
          x = result.x;
          y = result.y;
          state = result.state;
          
          if (Math.abs(x) > 2.5 || Math.abs(y) > 2.5) break;
          if (Math.abs(grad.dx) < 0.0001 && Math.abs(grad.dy) < 0.0001) break;
        }

        const newPathGroup = new THREE.Group();
        newPathGroup.name = 'gradientPath';
        sceneRef.current.add(newPathGroup);

        const startGeometry = new THREE.SphereGeometry(0.12, 16, 16);
        const startMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.5 });
        const startMarker = new THREE.Mesh(startGeometry, startMaterial);
        startMarker.position.copy(points[0]);
        newPathGroup.add(startMarker);

        let currentIndex = 0;
        
        const animateStep = () => {
          if (currentIndex >= points.length) {
            setAnimating(false);
            return;
          }

          const visiblePoints = points.slice(0, currentIndex + 1);
          
          const existingLine = newPathGroup.getObjectByName('animatedLine');
          if (existingLine) newPathGroup.remove(existingLine);
          
          if (visiblePoints.length >= 2) {
            const pathGeometry = new THREE.BufferGeometry().setFromPoints(visiblePoints);
            const pathLine = new THREE.Line(pathGeometry, new THREE.LineBasicMaterial({ color: 0xffcc00 }));
            pathLine.name = 'animatedLine';
            newPathGroup.add(pathLine);
          }

          const existingBall = newPathGroup.getObjectByName('currentBall');
          if (existingBall) newPathGroup.remove(existingBall);
          
          const ballGeometry = new THREE.SphereGeometry(0.15, 16, 16);
          const ballMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
          const ball = new THREE.Mesh(ballGeometry, ballMaterial);
          ball.position.copy(points[currentIndex]);
          ball.name = 'currentBall';
          newPathGroup.add(ball);

          currentIndex++;
          animationRef.current = setTimeout(animateStep, 30);
        };

        animateStep();
      };

      return React.createElement('div', {
        style: { 
          width: '100%', 
          height: '100vh', 
          background: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%)',
          fontFamily: "'Segoe UI', system-ui, sans-serif",
          overflow: 'hidden',
          position: 'relative'
        }
      }, [
        // Header
        React.createElement('div', {
          key: 'header',
          style: {
            position: 'absolute',
            top: 0,
            left: 0,
            right: 0,
            padding: '20px 30px',
            background: 'linear-gradient(180deg, rgba(26,26,46,0.95) 0%, rgba(26,26,46,0) 100%)',
            zIndex: 10
          }
        }, [
          React.createElement('h1', {
            key: 'title',
            style: {
              margin: 0,
              fontSize: '28px',
              fontWeight: '600',
              background: 'linear-gradient(90deg, #ff6b9d, #c084fc, #60a5fa)',
              WebkitBackgroundClip: 'text',
              WebkitTextFillColor: 'transparent',
              letterSpacing: '-0.5px'
            }
          }, '勾配降下法の説明'),
          React.createElement('p', {
            key: 'subtitle',
            style: {
              margin: '8px 0 0 0',
              fontSize: '14px',
              color: '#8888aa',
              letterSpacing: '0.5px'
            }
          }, 'Gradient Descent Visualization • ドラッグで回転 • スクロールでズーム')
        ]),

        // 3D Canvas Container
        React.createElement('div', {
          key: 'canvas',
          ref: containerRef,
          style: { 
            width: '100%', 
            height: '100%',
            cursor: 'grab'
          }
        }),

        // Control Panel
        React.createElement('div', {
          key: 'controls',
          style: {
            position: 'absolute',
            bottom: '20px',
            left: '50%',
            transform: 'translateX(-50%)',
            display: 'flex',
            flexDirection: 'column',
            gap: '15px',
            padding: '20px 25px',
            background: 'rgba(30, 30, 50, 0.95)',
            borderRadius: '16px',
            backdropFilter: 'blur(10px)',
            border: '1px solid rgba(255,255,255,0.1)',
            boxShadow: '0 10px 40px rgba(0,0,0,0.4)',
            minWidth: '320px'
          }
        }, [
          // Optimizer Selection
          React.createElement('div', { key: 'opt-section' }, [
            React.createElement('label', {
              key: 'opt-label',
              style: { color: '#aaa', fontSize: '12px', marginBottom: '8px', display: 'block' }
            }, '最適化アルゴリズム'),
            React.createElement('div', {
              key: 'opt-buttons',
              style: { display: 'flex', flexWrap: 'wrap', gap: '8px' }
            }, Object.entries(optimizerInfo).map(([key, info]) =>
              React.createElement('button', {
                key: key,
                onClick: () => setOptimizer(key),
                style: {
                  padding: '8px 14px',
                  fontSize: '12px',
                  fontWeight: optimizer === key ? '600' : '400',
                  color: optimizer === key ? '#fff' : '#999',
                  background: optimizer === key 
                    ? 'linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%)' 
                    : 'rgba(60,60,80,0.5)',
                  border: 'none',
                  borderRadius: '8px',
                  cursor: 'pointer',
                  transition: 'all 0.2s ease'
                }
              }, info.name)
            )),
            React.createElement('p', {
              key: 'opt-desc',
              style: { color: '#666', fontSize: '11px', marginTop: '6px', marginBottom: 0 }
            }, optimizerInfo[optimizer].description)
          ]),

          // Learning Rate
          React.createElement('div', { key: 'lr-section' }, [
            React.createElement('label', {
              key: 'lr-label',
              style: { color: '#aaa', fontSize: '12px', marginBottom: '6px', display: 'flex', justifyContent: 'space-between' }
            }, [
              React.createElement('span', { key: 'lr-text' }, '学習率 (Learning Rate)'),
              React.createElement('span', { key: 'lr-value', style: { color: '#60a5fa', fontFamily: 'monospace' } }, learningRate.toFixed(3))
            ]),
            React.createElement('input', {
              key: 'lr-slider',
              type: 'range',
              min: '0.001',
              max: '0.5',
              step: '0.001',
              value: learningRate,
              onChange: (e) => setLearningRate(parseFloat(e.target.value)),
              style: { width: '100%', accentColor: '#60a5fa', cursor: 'pointer' }
            }),
            React.createElement('div', {
              key: 'lr-range',
              style: { display: 'flex', justifyContent: 'space-between', color: '#555', fontSize: '10px' }
            }, [
              React.createElement('span', { key: 'min' }, '0.001'),
              React.createElement('span', { key: 'max' }, '0.5')
            ])
          ]),

          // Momentum parameter (conditional)
          optimizer === 'momentum' && React.createElement('div', { key: 'mom-section' }, [
            React.createElement('label', {
              key: 'mom-label',
              style: { color: '#aaa', fontSize: '12px', marginBottom: '6px', display: 'flex', justifyContent: 'space-between' }
            }, [
              React.createElement('span', { key: 'mom-text' }, 'モーメンタム係数'),
              React.createElement('span', { key: 'mom-value', style: { color: '#c084fc', fontFamily: 'monospace' } }, momentum.toFixed(2))
            ]),
            React.createElement('input', {
              key: 'mom-slider',
              type: 'range',
              min: '0',
              max: '0.99',
              step: '0.01',
              value: momentum,
              onChange: (e) => setMomentum(parseFloat(e.target.value)),
              style: { width: '100%', accentColor: '#c084fc', cursor: 'pointer' }
            })
          ]),

          // Adam parameters (conditional)
          optimizer === 'adam' && React.createElement('div', {
            key: 'adam-section',
            style: { display: 'flex', gap: '15px' }
          }, [
            React.createElement('div', { key: 'beta1', style: { flex: 1 } }, [
              React.createElement('label', {
                key: 'beta1-label',
                style: { color: '#aaa', fontSize: '11px', marginBottom: '4px', display: 'flex', justifyContent: 'space-between' }
              }, [
                React.createElement('span', { key: 'b1-text' }, 'β₁'),
                React.createElement('span', { key: 'b1-value', style: { color: '#c084fc', fontFamily: 'monospace' } }, beta1.toFixed(2))
              ]),
              React.createElement('input', {
                key: 'beta1-slider',
                type: 'range',
                min: '0',
                max: '0.999',
                step: '0.01',
                value: beta1,
                onChange: (e) => setBeta1(parseFloat(e.target.value)),
                style: { width: '100%', accentColor: '#c084fc', cursor: 'pointer' }
              })
            ]),
            React.createElement('div', { key: 'beta2', style: { flex: 1 } }, [
              React.createElement('label', {
                key: 'beta2-label',
                style: { color: '#aaa', fontSize: '11px', marginBottom: '4px', display: 'flex', justifyContent: 'space-between' }
              }, [
                React.createElement('span', { key: 'b2-text' }, 'β₂'),
                React.createElement('span', { key: 'b2-value', style: { color: '#f472b6', fontFamily: 'monospace' } }, beta2.toFixed(3))
              ]),
              React.createElement('input', {
                key: 'beta2-slider',
                type: 'range',
                min: '0.9',
                max: '0.9999',
                step: '0.0001',
                value: beta2,
                onChange: (e) => setBeta2(parseFloat(e.target.value)),
                style: { width: '100%', accentColor: '#f472b6', cursor: 'pointer' }
              })
            ])
          ]),

          // Run Button
          React.createElement('div', {
            key: 'btn-section',
            style: { display: 'flex', gap: '10px' }
          }, [
            React.createElement('button', {
              key: 'run-btn',
              onClick: runAnimation,
              style: {
                flex: 1,
                padding: '12px 24px',
                fontSize: '14px',
                fontWeight: '600',
                color: '#fff',
                background: 'linear-gradient(135deg, #ff6b9d 0%, #c084fc 100%)',
                border: 'none',
                borderRadius: '10px',
                cursor: 'pointer',
                transition: 'all 0.3s ease',
                boxShadow: '0 4px 15px rgba(192,132,252,0.4)'
              }
            }, animating ? '🎯 再スタート' : '🎯 最適化を実行'),
            animating && React.createElement('button', {
              key: 'stop-btn',
              onClick: stopAnimation,
              style: {
                padding: '12px 16px',
                fontSize: '14px',
                fontWeight: '600',
                color: '#fff',
                background: 'rgba(239, 68, 68, 0.8)',
                border: 'none',
                borderRadius: '10px',
                cursor: 'pointer',
                transition: 'all 0.3s ease'
              }
            }, '⏹')
          ])
        ]),

        // Legend
        React.createElement('div', {
          key: 'legend',
          style: {
            position: 'absolute',
            top: '100px',
            right: '20px',
            padding: '20px',
            background: 'rgba(30, 30, 50, 0.85)',
            borderRadius: '12px',
            backdropFilter: 'blur(10px)',
            border: '1px solid rgba(255,255,255,0.1)',
            fontSize: '13px',
            color: '#ccc'
          }
        }, [
          React.createElement('div', {
            key: 'legend-title',
            style: { marginBottom: '12px', fontWeight: '600', color: '#fff' }
          }, '凡例'),
          React.createElement('div', {
            key: 'minima',
            style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '8px' }
          }, [
            React.createElement('div', { key: 'dot', style: { width: '12px', height: '12px', background: '#ff3366', borderRadius: '50%' } }),
            React.createElement('span', { key: 'text' }, '極小値 (Minima)')
          ]),
          React.createElement('div', {
            key: 'current',
            style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '8px' }
          }, [
            React.createElement('div', { key: 'dot', style: { width: '12px', height: '12px', background: '#00ff88', borderRadius: '50%' } }),
            React.createElement('span', { key: 'text' }, '現在位置 (Current)')
          ]),
          React.createElement('div', {
            key: 'path',
            style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '8px' }
          }, [
            React.createElement('div', { key: 'line', style: { width: '20px', height: '3px', background: '#ffcc00', borderRadius: '2px' } }),
            React.createElement('span', { key: 'text' }, '最適化経路 (Path)')
          ]),
          React.createElement('div', {
            key: 'loss',
            style: { display: 'flex', alignItems: 'center', gap: '10px' }
          }, [
            React.createElement('div', { key: 'grad', style: { width: '20px', height: '12px', background: 'linear-gradient(90deg, #00d4ff, #ff00ff)', borderRadius: '2px' } }),
            React.createElement('span', { key: 'text' }, '損失関数 (Loss)')
          ])
        ])
      ]);
    }

    ReactDOM.render(
      React.createElement(OptimizationVisualization),
      document.getElementById('root')
    );
  </script>
</body>
</html>
